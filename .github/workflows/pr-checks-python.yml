name: Python PR Checks

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'python/**'
      - 'apps/sqlrooms-cli-ui/**'
      - '.github/workflows/pr-checks-python.yml'
  pull_request:
    types: [opened, edited, synchronize, reopened]
    paths:
      - 'python/**'
      - 'apps/sqlrooms-cli-ui/**'
      - '.github/workflows/pr-checks-python.yml'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.action != 'edited' || github.event.pull_request.user.login == 'renovate[bot]'

    defaults:
      run:
        working-directory: python

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        name: Install pnpm
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
        working-directory: .

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Lint with ruff
        run: uv run ruff check .

      - name: Build CLI UI bundle
        run: pnpm --filter sqlrooms-python build:ui
        working-directory: .

      - name: Build packages
        run: uv build --all

      - name: Verify sqlrooms wheel
        run: python sqlrooms/scripts/verify_wheel.py dist/sqlrooms-*.whl

      - name: Run tests
        run: uv run pytest
